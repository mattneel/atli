name: CI

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: Install tier-1 codegen toolchain
        run: |
          sudo apt-get update
          if ! sudo apt-get install -y clang-22 mlir-22-tools llvm-22-tools; then
            echo "::warning::LLVM 22 toolchain unavailable; codegen tests will skip compiled execution"
          fi
      - run: cargo test


  proofs:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y coq=8.18.0+dfsg-1build2
      - run: coqc --version
      - run: make -C proofs
